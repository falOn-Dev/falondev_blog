{% if page.toc %}
<details class="toc">
  <summary class="toc__toggle">[ contents ]</summary>
  <nav aria-label="Table of contents">
    <ul class="toc__list">
      {% for h in page.toc %}
      <li class="toc__item">
        <a href="#{{ h.id }}">{{ h.title }}</a>
        {% if h.children %}
        <ul class="toc__list toc__list--nested">
          {% for child in h.children %}
          <li class="toc__item"><a href="#{{ child.id }}">{{ child.title }}</a></li>
          {% endfor %}
        </ul>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </nav>
</details>
{% endif %}
