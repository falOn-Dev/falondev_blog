<figure class="yt-embed">
  <div class="yt-embed__player">
    <iframe
      src="https://www.youtube-nocookie.com/embed/{{ id }}"
      title="{{ caption | default(value='YouTube video') }}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
  {%- if caption %}
  <figcaption class="yt-embed__caption">{{ caption }}</figcaption>
  {%- endif %}
</figure>
